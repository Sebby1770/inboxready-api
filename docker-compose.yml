services:
  api:
    build:
      context: ./API
    env_file:
      - ./API/.env.example
    environment:
      INBOXREADY_DATABASE_PATH: /data/inboxready.sqlite3
      INBOXREADY_PUBLIC_BASE_URL: http://127.0.0.1:8080
      INBOXREADY_SESSION_SECRET: staging-local-change-before-production
    volumes:
      - inboxready-data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  inboxready-data:
