apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inboxready-api
  namespace: inboxready
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.inboxready.dev
      secretName: inboxready-tls
  rules:
    - host: api.inboxready.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: inboxready-api
                port:
                  name: http
