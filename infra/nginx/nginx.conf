events {
  worker_connections 1024;
}

http {
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log warn;

  proxy_cache_path /var/cache/nginx/inboxready levels=1:2 keys_zone=inboxready_cache:10m max_size=128m inactive=10m use_temp_path=off;
  limit_req_zone $binary_remote_addr zone=inboxready_public:10m rate=10r/s;

  upstream inboxready_api {
    least_conn;
    server api:8000 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location = /healthz {
      proxy_pass http://inboxready_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /readyz {
      proxy_pass http://inboxready_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location = /metrics {
      allow 127.0.0.1;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
      proxy_pass http://inboxready_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
    }

    location /ws/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_pass http://inboxready_api;
    }

    location ~ ^/(static|docs|openapi.json) {
      proxy_cache inboxready_cache;
      proxy_cache_valid 200 5m;
      proxy_pass http://inboxready_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
      limit_req zone=inboxready_public burst=30 nodelay;
      proxy_http_version 1.1;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;
      proxy_pass http://inboxready_api;
    }
  }
}
