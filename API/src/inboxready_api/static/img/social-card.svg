<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="InboxReady — email domain readiness audits">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- brand -->
  <g transform="translate(80,80)">
    <rect width="64" height="64" rx="16" fill="url(#accent)"/>
    <text x="32" y="43" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a" text-anchor="middle">IR</text>
    <text x="84" y="42" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="600" fill="#e2e8f0">InboxReady</text>
  </g>

  <!-- headline -->
  <text x="80" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f8fafc">Is your email</text>
  <text x="80" y="384" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#f8fafc">domain ready to send?</text>

  <text x="80" y="452" font-family="Inter, Arial, sans-serif" font-size="30" fill="#94a3b8">One API call checks SPF, DKIM, DMARC, MTA-STS,</text>
  <text x="80" y="492" font-family="Inter, Arial, sans-serif" font-size="30" fill="#94a3b8">BIMI &amp; TLS-RPT — with a clear score and fixes.</text>

  <!-- check chips -->
  <g font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">
    <g transform="translate(80,548)">
      <rect width="120" height="46" rx="23" fill="#0b1220" stroke="#334155"/>
      <text x="60" y="30" text-anchor="middle">SPF</text>
    </g>
    <g transform="translate(216,548)">
      <rect width="130" height="46" rx="23" fill="#0b1220" stroke="#334155"/>
      <text x="65" y="30" text-anchor="middle">DKIM</text>
    </g>
    <g transform="translate(362,548)">
      <rect width="150" height="46" rx="23" fill="#0b1220" stroke="#334155"/>
      <text x="75" y="30" text-anchor="middle">DMARC</text>
    </g>
    <g transform="translate(528,548)">
      <rect width="160" height="46" rx="23" fill="#0b1220" stroke="#334155"/>
      <text x="80" y="30" text-anchor="middle">MTA-STS</text>
    </g>
  </g>

  <!-- score badge -->
  <g transform="translate(940,150)">
    <circle cx="90" cy="90" r="90" fill="none" stroke="#1e293b" stroke-width="16"/>
    <circle cx="90" cy="90" r="90" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-dasharray="452" stroke-dashoffset="90" transform="rotate(-90 90 90)"/>
    <text x="90" y="86" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#f8fafc" text-anchor="middle">92</text>
    <text x="90" y="126" font-family="Inter, Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">SCORE</text>
  </g>
</svg>
