name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: API
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile package
        run: python -m compileall API/src

      - name: Run tests
        working-directory: API
        run: pytest -q
